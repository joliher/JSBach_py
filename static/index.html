<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Router JSBach</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-rows: 20% 80%; /* Cabecera más alta */
            height: 100%;
        }
        .top-frame { width: 100%; height: 100%; border: none; }
        .bottom {
            display: grid;
            grid-template-columns: 25% 75%;
            height: 100%;
        }
        .left-frame, .right-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabecera -->
        <iframe src="/header.html" class="top-frame" name="header"></iframe>

        <!-- Menú y contenido -->
        <div class="bottom">
            <iframe src="/status.html" class="left-frame" name="menu"></iframe>
            <iframe src="/info.html" class="right-frame" name="body"></iframe>
        </div>
    </div>
</body>
</html>
