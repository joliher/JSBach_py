<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONFIG VLANS</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

th {
    background: #f0f0f0;
}

button {
    margin-right: 4px;
    padding: 4px 8px;
    cursor: pointer;
}

input[type="text"] {
    width: 100%;
    box-sizing: border-box;
}

form {
    border-top: 2px solid #ccc;
    padding-top: 10px;
}

input, form button {
    padding: 6px;
    margin: 4px 0;
    width: 100%;
}

.btn-edit {
    background-color: #ccc;
    border: 1px solid #999;
}

.btn-delete {
    background-color: #d9534f;
    color: white;
    border: 1px solid #b52b27;
}

.btn-save {
    background-color: #5cb85c;
    color: white;
    border: 1px solid #3e8f3e;
}

.btn-cancel {
    background-color: #d9534f;
    color: white;
    border: 1px solid #b52b27;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
</head>

<body>

<h3>VLANs configuradas</h3>

<table id="vlansTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>IP</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Nueva VLAN</h3>

<form id="vlanForm">
    <label>ID VLAN</label>
    <input type="number" name="id" required>

    <label>Nombre</label>
    <input type="text" name="name" required>

    <label>IP (ej: 10.0.0.1/24)</label>
    <input type="text" name="ip" required>

    <button type="submit">Guardar VLAN</button>
</form>

<pre id="output"></pre>

<script>
let vlanCache = {};
const PROTECTED_VLANS = [1, 2];

function isValidCIDR(ip) {
    const cidrRegex =
        /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}\/([0-9]|[1-2]\d|3[0-2])$/;

    return cidrRegex.test(ip);
}

async function loadVlans() {
    const res = await fetch("/run/bridge.py?config&action=show&section=vlans");
    const text = await res.text();

    const tbody = document.querySelector("#vlansTable tbody");
    tbody.innerHTML = "";
    vlanCache = {};

    const vlans = [];

    text.split("\n").forEach(line => {
        line = line.trim();
        if (!line.startsWith("{")) return;

        const jsonLine = line.replace(/'/g, '"');

        try {
            const vlan = JSON.parse(jsonLine);
            vlans.push(vlan);
        } catch (e) {
            console.error("Error parseando VLAN:", line);
        }
    });

    // ORDENAR POR ID
    vlans.sort((a, b) => a.id - b.id);

    // PINTAR TABLA
    vlans.forEach(vlan => {
        vlanCache[vlan.id] = vlan;

        const tr = document.createElement("tr");
        tr.dataset.id = vlan.id;

        const isProtected = PROTECTED_VLANS.includes(vlan.id);

        tr.innerHTML = `
            <td>${vlan.id}</td>
            <td>${vlan.name ?? ""}</td>
            <td>${vlan.ip ?? ""}</td>
            <td>
                <button class="btn-edit" onclick="editRow(${vlan.id})">
                    Modificar
                </button>
                <button class="btn-delete"
                        onclick="deleteVlan(${vlan.id})"
                        ${isProtected ? "disabled" : ""}>
                    Eliminar
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

function editRow(id) {
    const tr = document.querySelector(`tr[data-id="${id}"]`);
    const vlan = vlanCache[id];

    tr.innerHTML = `
        <td>${vlan.id}</td>
        <td><input type="text" value="${vlan.name ?? ""}"></td>
        <td><input type="text" value="${vlan.ip ?? ""}"></td>
        <td>
            <button class="btn-save" onclick="saveRow(${id})">Guardar</button>
            <button class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
        </td>
    `;
}

async function saveRow(id) {
    const tr = document.querySelector(`tr[data-id="${id}"]`);
    const inputs = tr.querySelectorAll("input");

    const [name, ip] = Array.from(inputs).map(i => i.value.trim());

    if (!isValidCIDR(ip)) {
        alert("IP inválida. Formato esperado: 10.0.0.1/24");
        return;
    }

    const params = new URLSearchParams({
        config: "",
        action: "save",
        section: "vlans",
        id: id,
        name: name,
        ip: ip
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    document.getElementById("output").textContent = await res.text();

    loadVlans();
}

function cancelEdit() {
    loadVlans();
}

async function deleteVlan(id) {
    if (!confirm(`¿Eliminar VLAN ${id}?`)) return;

    const params = new URLSearchParams({
        config: "",
        action: "del",
        section: "vlans",
        id: id
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    const text = await res.text();
    document.getElementById("output").textContent = text;

    loadVlans();
}

document.getElementById("vlanForm").addEventListener("submit", async e => {
    e.preventDefault();

    const form = e.target;
    const ip = form.ip.value.trim();

    if (!isValidCIDR(ip)) {
        alert("IP inválida. Usa formato CIDR, por ejemplo: 10.0.0.1/24");
        return;
    }

    const params = new URLSearchParams({
        config: "",
        action: "save",
        section: "vlans",
        id: form.id.value,
        name: form.name.value,
        ip: ip
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    document.getElementById("output").textContent = await res.text();

    form.reset();
    loadVlans();
});

loadVlans();
</script>

</body>
</html>
