<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONFIG BRIDGE</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

th {
    background: #f0f0f0;
}

button {
    margin-right: 4px;
    padding: 4px 8px;
    cursor: pointer;
}

input[type="text"] {
    width: 100%;
    box-sizing: border-box;
}

form {
    border-top: 2px solid #ccc;
    padding-top: 10px;
}

input, form button {
    padding: 6px;
    margin: 4px 0;
    width: 100%;
}

/* Colores botones */
.btn-edit {
    background-color: #ccc;
    border: 1px solid #999;
}

.btn-delete {
    background-color: #d9534f;
    color: white;
    border: 1px solid #b52b27;
}

.btn-save {
    background-color: #5cb85c;
    color: white;
    border: 1px solid #3e8f3e;
}

.btn-cancel {
    background-color: #d9534f;
    color: white;
    border: 1px solid #b52b27;
}
</style>
</head>

<body>

<h3>Interfaces del bridge</h3>

<table id="bridgeTable">
    <thead>
        <tr>
            <th>Interface</th>
            <th>VLAN Untag</th>
            <th>VLAN Tag</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Nueva Interface</h3>

<form id="bridgeForm">
    <label>Nombre de la interface</label>
    <input type="text" name="name" required>

    <label>VLAN Untag (ej: 10)</label>
    <input type="text" name="vlan_untag">

    <label>VLAN Tag (ej: 20,30)</label>
    <input type="text" name="vlan_tag">

    <button type="submit">Guardar Interface</button>
</form>

<pre id="output"></pre>

<script>
let bridgeCache = {};

async function loadBridge() {
    const res = await fetch("/run/bridge.py?config&action=show&section=bridge");
    const text = await res.text();

    const tbody = document.querySelector("#bridgeTable tbody");
    tbody.innerHTML = "";
    bridgeCache = {};

    const ifaces = [];

    text.split("\n").forEach(line => {
        line = line.trim();
        if (!line.startsWith("{")) return;

        const jsonLine = line.replace(/'/g, '"');

        try {
            const iface = JSON.parse(jsonLine);
            ifaces.push(iface);
        } catch (e) {
            console.error("Error parseando interface:", line);
        }
    });

    /* 🔹 Ordenar por nombre de interface */
    ifaces.sort((a, b) => a.name.localeCompare(b.name));

    /* 🔹 Pintar tabla */
    ifaces.forEach(iface => {
        bridgeCache[iface.name] = iface;

        const tr = document.createElement("tr");
        tr.dataset.name = iface.name;

        tr.innerHTML = `
            <td>${iface.name}</td>
            <td>${iface.vlan_untag ?? ""}</td>
            <td>${iface.vlan_tag ?? ""}</td>
            <td>
                <button class="btn-edit" onclick="editRow('${iface.name}')">
                    Modificar
                </button>
                <button class="btn-delete" onclick="deleteIface('${iface.name}')">
                    Eliminar
                </button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

function editRow(name) {
    const tr = document.querySelector(`tr[data-name="${name}"]`);
    const iface = bridgeCache[name];

    tr.innerHTML = `
        <td>${iface.name}</td>
        <td><input type="text" value="${iface.vlan_untag ?? ""}"></td>
        <td><input type="text" value="${iface.vlan_tag ?? ""}"></td>
        <td>
            <button class="btn-save" onclick="saveRow('${name}')">Guardar</button>
            <button class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
        </td>
    `;
}

async function saveRow(name) {
    const tr = document.querySelector(`tr[data-name="${name}"]`);
    const inputs = tr.querySelectorAll("input");

    const [vlan_untag, vlan_tag] = Array.from(inputs).map(i => i.value);

    const params = new URLSearchParams({
        config: "",
        action: "save",
        section: "bridge",
        name: name,
        vlan_untag: vlan_untag,
        vlan_tag: vlan_tag
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    const text = await res.text();
    document.getElementById("output").textContent = text;

    loadBridge();
}

function cancelEdit() {
    loadBridge();
}

async function deleteIface(name) {
    if (!confirm(`¿Eliminar interface ${name}?`)) return;

    const params = new URLSearchParams({
        config: "",
        action: "del",
        section: "bridge",
        name: name
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    const text = await res.text();
    document.getElementById("output").textContent = text;

    loadBridge();
}

document.getElementById("bridgeForm").addEventListener("submit", async e => {
    e.preventDefault();

    const form = e.target;
    const params = new URLSearchParams({
        config: "",
        action: "save",
        section: "bridge",
        name: form.name.value,
        vlan_untag: form.vlan_untag.value,
        vlan_tag: form.vlan_tag.value
    });

    const res = await fetch(`/run/bridge.py?${params.toString()}`);
    const text = await res.text();
    document.getElementById("output").textContent = text;

    form.reset();
    loadBridge();
});

loadBridge();
</script>

</body>
</html>
