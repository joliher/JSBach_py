<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>WAN - Configuración</title>
        <style>
            html, body { margin: 0; font-family: Arial, sans-serif; background-color: #eef3f8; padding: 10px; }
            button { margin: 5px; padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background-color: #eee; }
            button.selected { background-color: #3399ff; color: white; border-color: #007acc; }
            #manualFields { display: none; margin-top: 10px; }
            label { display: block; margin: 5px 0; }
            input, select { padding: 4px; margin-left: 5px; }
            pre { white-space: pre-wrap; word-wrap: break-word; font-size: 14px; background: #f8f8f8; padding: 10px; border: 1px solid #ddd; }
        </style>
    </head>
    <body>

        <h3>Configuración WAN</h3>

        <pre id="output">Rellena los campos y pulsa "Guardar Configuración" para aplicar la configuración.</pre>

        <div>
            <button type="button" id="btnDHCP" onclick="setMode('dhcp')">DHCP</button>
            <button type="button" id="btnManual" onclick="setMode('manual')">Manual</button>
        </div>

        <form id="configForm" onsubmit="submitConfig(event)">
            <label>Interfaz: <input type="text" id="interface" required></label>

            <div id="manualFields">
                <label>IP: <input type="text" id="ip"></label>
                <label>Máscara: <input type="text" id="mask"></label>
                <label>Puerta de Enlace: <input type="text" id="gateway"></label>
                <label>DNS: <input type="text" id="dns"></label>
            </div>

            <input type="hidden" id="mode" value="">
            <button type="submit">Guardar Configuración</button>
        </form>

        <script>
            function setMode(m) {
                document.getElementById("mode").value = m;
                document.getElementById("manualFields").style.display = (m === "manual") ? "block" : "none";

                const btnDHCP = document.getElementById("btnDHCP");
                const btnManual = document.getElementById("btnManual");

                if (m === "dhcp") {
                    btnDHCP.classList.add("selected");
                    btnManual.classList.remove("selected");
                } else if (m === "manual") {
                    btnDHCP.classList.remove("selected");
                    btnManual.classList.add("selected");
                }

                // Guardamos modo en localStorage
                localStorage.setItem("wanConfigMode", m);
            }

            // Al cargar la página, restauramos el modo y los campos
            window.addEventListener("DOMContentLoaded", () => {
                const savedMode = localStorage.getItem("wanConfigMode");
                if (savedMode) {
                    setMode(savedMode);
                }

                // Opcional: restaurar valores de los inputs si quieres persistencia completa
                const fields = ["interface", "ip", "mask", "gateway", "dns"];
                fields.forEach(id => {
                    const value = localStorage.getItem(id);
                    if (value) document.getElementById(id).value = value;
                });
            });

            async function submitConfig(event) {
                event.preventDefault();

                const params = new URLSearchParams();
                params.append("action", "config");
                params.append("mode", document.getElementById("mode").value);
                params.append("interface", document.getElementById("interface").value);

                if (document.getElementById("mode").value === "manual") {
                    params.append("ip", document.getElementById("ip").value);
                    params.append("mask", document.getElementById("mask").value);
                    params.append("gateway", document.getElementById("gateway").value);
                    params.append("dns", document.getElementById("dns").value);
                }

                // Guardamos valores en localStorage
                ["interface","ip","mask","gateway","dns"].forEach(id => {
                    localStorage.setItem(id, document.getElementById(id).value);
                });

                const output = document.getElementById("output");

                try {
                    const resp = await fetch(`/run/wan.py?${params.toString()}`);
                    const data = await resp.text(); // si tu backend devuelve texto plano
                    output.textContent = data;
                } catch (e) {
                    output.textContent = "Error al guardar la configuración: " + e;
                }
            }
        </script>
    </body>
</html>
